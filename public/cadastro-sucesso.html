<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Cadastro recebido | Plataforma AproveitAI</title>
  <link rel="stylesheet" href="style.css">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

</head>
<body>

<header class="site-header">
  <div class="brandline">
    <img src="logo-prometheus.png" class="logo logo-prometheus">
    <div class="brand-center">
      <h1 class="site-title">Plataforma AproveitAI</h1>
      <p class="slogan">Tecnologia com ConsciêncIA gera Resultado.</p>
      <p class="boas-vindas">
        ✅ <strong>Cadastro recebido com sucesso</strong>
      </p>
    </div>
    <img src="logo-aproveitai.png" class="logo logo-aproveitai">
  </div>
</header>

<div class="card-info" style="
  <div class="card-info
  <button
    onclick="abrirWhatsApp()"
    style="
      margin-top:20px;
      padding:14px 22px;
      font-size:16px;
      border:none;
      border-radius:8px;
      background:#25d366;
      color:#fff;
      cursor:pointer;
    "
  >
    📲 Tirar dúvidas no WhatsApp

  </button>

</div>

<script>
function abrirWhatsApp() {
  const nome = localStorage.getItem("ultimoCadastroNome") || "Não informado";
const cpf  = localStorage.getItem("ultimoCadastroCPF") || "Não informado";


  const telefoneAdmin = "5528999692303";

  const mensagem = `📥 Cadastro enviado – Plataforma AproveitAI

👤 Nome: ${nome}
📄 CPF: ${cpf}

⏳ Status: aguardando análise/liberação

ℹ️ Observação:
Caso este CPF já possua cadastro ativo, esta mensagem serve apenas como confirmação de dados.`;

  window.open(
    "https://api.whatsapp.com/send?phone=" + telefoneAdmin +
    "&text=" + encodeURIComponent(mensagem),
    "_blank"
  );
}

</script>

<div style="margin-top:20px;text-align:center;">

<a
href="index.html"
class="btn-aproveitai">

⬅ Voltar ao Site

</a>

</div>

</body>
</html>
