<!-- 👉 Início do arquivo HTML -->
<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Painel do Cliente - Cartão AproveitAI</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>

#voltar-fixo {
  position: fixed;
  bottom: 20px;
  left: 20px;
  padding: 12px 24px;
  font-size: 16px;
  background-color: #0a7f2e;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
  box-shadow: 0 3px 8px rgba(0,0,0,0.3);
  z-index: 999;
}


body, html {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-start;
}

.wrap {
  flex-grow: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
}

    body {
      background: linear-gradient(to bottom, #cceeff, #a3d8ff);
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    header {
      margin: 20px;
      text-align: center;
    }
    header img {
      height: 100px;
      margin: 0 10px;
    }
    header h1 {
      background-color: #dfffe8;
      color: #007a33;
      display: inline-block;
      padding: 10px 20px;
      border-radius: 20px;
      font-size: 1.5em;
    }
    #painel {
      background: white;
      padding: 30px;
      border-radius: 15px;
      box-shadow: 0 0 10px rgba(0,0,0,0.2);
      width: 95%;
      max-width: 900px;
      margin-bottom: 30px;
    }
    .dados, .beneficios, .promocoes {
      margin-bottom: 20px;
    }
    .dados p, .beneficios li, .promocoes li {
      font-size: 1em;
      margin: 5px 0;
    }
    .beneficios ul, .promocoes ul {
      padding-left: 20px;
    }
    button {
      background-color: #007a33;
      color: white;
      font-weight: bold;
      padding: 10px 20px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      margin: 10px 5px;
    }
    h2, h3 {
      text-align: center;
    }
h2 {
  background-color: #f0f0f0;
  color: #000;
  padding: 10px;
  border-radius: 8px;
  margin-top: 30px;
}

h3 {
  background-color: #e0f7fa;
  color: #000;
  padding: 6px 12px;
  border-left: 4px solid #007a33;
  border-radius: 4px;
  margin-top: 20px;
}

  </style>
</head>
<body>
  <header>
    <img src="logo-prometheus.png" alt="Logo ConsciencIAs">
    <h1>Painel do Cliente</h1>
    <img src="logo-aproveitai.png" alt="Logo AproveitAI">
  </header>

  <div id="painel">
    <div class="dados">
      <h2>Seus dados</h2>
      <p><strong>Nome:</strong> <span id="nome"></span></p>
      <p><strong>Cidade:</strong> <span id="cidade"></span></p>
      <p><strong>Grupo:</strong> <span id="grupo"></span></p>
      <p><strong>ID Público:</strong> <span id="idPublico"></span></p>
      <p><strong>CPF:</strong> <span id="cpf"></span></p>
      <p><strong>Celular:</strong> <span id="celular"></span></p>
      <p><strong>Cadastro:</strong> <span id="dataCadastro"></span></p>
    </div>

    <div class="beneficios">
      <h2>BENEFÍCIOS</h2>
      <h3>Benefícios gerais</h3>
      <ul id="beneficiosGerais"></ul>
      <h3>Benefícios exclusivos para VOCÊ</h3>
      <ul id="beneficiosExclusivos"></ul>
    </div>

    <div class="promocoes">
      <h2>PROMOÇÕES</h2>
      <h3>Promoções gerais</h3>
      <ul id="promocoesGerais"></ul>
      <h3>Promoções exclusivas para VOCÊ</h3>
      <ul id="promocoesExclusivas"></ul>
    </div>

    <div style="text-align:center">
      <button onclick="verCartao()">Ver Cartão</button>
      <button onclick="enviarWhatsapp()">Solicitar alteração de dados</button>
    </div>
  </div>
<script defer src="painelcliente.js"></script>
<button id="voltar-fixo" onclick="window.history.back()">⬅️ Voltar</button>
<script src="script/painelcliente.js"></script>
<script src="script/painel-cliente.js"></script>
</body>
</html>
